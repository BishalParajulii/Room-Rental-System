{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Rental Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'app/css/chat.css' %}">
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <h2>Chat Login</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="ram or hari">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button onclick="login()">Login to Chat</button>
            <p id="login-error" style="color: #ef4444; font-size: 0.8rem; margin-top: 1rem; text-align: center;"></p>
        </div>
    </div>

    <!-- Chat Layout -->
    <div id="chat-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3 id="current-user-display">My Chats</h3>
                <button id="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="conversation-list" id="conv-list">
                <!-- Conversations will appear here -->
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="chat-header">
                <div class="avatar" id="active-avatar">?</div>
                <div>
                    <h4 id="active-user-name">Select a conversation</h4>
                    <p id="active-user-status" style="font-size: 0.75rem; color: var(--text-muted);">Pick a user to start chatting</p>
                </div>
            </div>

            <div class="messages-container" id="messages-box">
                <div class="empty-state">
                    <p>No messages yet. Select a user to start.</p>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Type a message..." onkeypress="handleKey(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="{% static 'app/js/chat.js' %}"></script>
</body>
</html>
