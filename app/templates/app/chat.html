<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Rental Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --chat-bg: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --my-msg-bg: #6366f1;
            --other-msg-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Login Screen */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-card h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        /* Main Chat Layout */
        #chat-layout {
            display: none; /* Hidden by default */
            flex-grow: 1;
            height: 100vh;
            grid-template-columns: 300px 1fr;
        }

        .sidebar {
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            font-size: 1.1rem;
        }

        .conversation-list {
            flex-grow: 1;
            overflow-y: auto;
        }

        .conv-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .conv-item:hover {
            background-color: #f1f5f9;
        }

        .conv-item.active {
            background-color: #eef2ff;
            border-left: 4px solid var(--primary-color);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .conv-info h4 {
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }

        .conv-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
        }

        .chat-header {
            padding: 1rem 2rem;
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .messages-container {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            line-height: 1.4;
            position: relative;
        }

        .message.sent {
            align-self: flex-end;
            background-color: var(--my-msg-bg);
            color: white;
            border-bottom-right-radius: 0.2rem;
        }

        .message.received {
            align-self: flex-start;
            background-color: var(--other-msg-bg);
            color: var(--text-main);
            border-bottom-left-radius: 0.2rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .message .time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 0.25rem;
            display: block;
            text-align: right;
        }

        .chat-input-area {
            padding: 1.5rem 2rem;
            background-color: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
        }

        .chat-input-area input {
            flex-grow: 1;
        }

        .chat-input-area button {
            width: auto;
            padding: 0.75rem 1.5rem;
        }

        #logout-btn {
            background: none;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            width: auto;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <h2>Chat Login</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="ram or hari">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button onclick="login()">Login to Chat</button>
            <p id="login-error" style="color: #ef4444; font-size: 0.8rem; margin-top: 1rem; text-align: center;"></p>
        </div>
    </div>

    <!-- Chat Layout -->
    <div id="chat-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3 id="current-user-display">My Chats</h3>
                <button id="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="conversation-list" id="conv-list">
                <!-- Conversations will appear here -->
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="chat-header">
                <div class="avatar" id="active-avatar">?</div>
                <div>
                    <h4 id="active-user-name">Select a conversation</h4>
                    <p id="active-user-status" style="font-size: 0.75rem; color: var(--text-muted);">Pick a user to start chatting</p>
                </div>
            </div>

            <div class="messages-container" id="messages-box">
                <div class="empty-state">
                    <p>No messages yet. Select a user to start.</p>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Type a message..." onkeypress="handleKey(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let token = localStorage.getItem('chat_token');
        let activeUserId = null;
        let pollInterval = null;

        if (token) {
            showChat();
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');

            try {
                const response = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('chat_token', token);
                    localStorage.setItem('chat_user', JSON.stringify(currentUser));
                    showChat();
                } else {
                    let msg = "Invalid credentials";
                    if (data.non_field_errors) msg = data.non_field_errors[0];
                    else if (data.detail) msg = data.detail;
                    else if (typeof data === 'object') msg = Object.values(data)[0];
                    errorEl.textContent = msg;
                }
            } catch (err) {
                errorEl.textContent = "Server error";
            }
        }

        function logout() {
            localStorage.removeItem('chat_token');
            localStorage.removeItem('chat_user');
            location.reload();
        }

        function showChat() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-layout').style.display = 'grid';
            currentUser = JSON.parse(localStorage.getItem('chat_user'));
            document.getElementById('current-user-display').textContent = currentUser.username;
            loadConversations();
            
            // Auto-refresh conversations every 10 seconds
            setInterval(loadConversations, 10000);
        }

        async function loadConversations() {
            const res = await fetch('/api/chat/conversations/', {
                headers: { 'Authorization': `Token ${token}` }
            });
            const users = await res.json();
            const listEl = document.getElementById('conv-list');
            
            // If empty, maybe show 'No chats yet'
            if (users.length === 0) {
                listEl.innerHTML = '<p style="padding: 1rem; text-align: center; color: gray;">No active chats</p>';
                return;
            }

            listEl.innerHTML = users.map(user => `
                <div class="conv-item ${activeUserId === user.id ? 'active' : ''}" onclick="selectUser(${user.id}, '${user.username}')">
                    <div class="avatar">${user.username[0].toUpperCase()}</div>
                    <div class="conv-info">
                        <h4>${user.username}</h4>
                        <p>${user.role}</p>
                    </div>
                </div>
            `).join('');
        }

        function selectUser(id, name) {
            activeUserId = id;
            document.getElementById('active-user-name').textContent = name;
            document.getElementById('active-avatar').textContent = name[0].toUpperCase();
            document.getElementById('active-user-status').textContent = 'Online';
            
            // Update active state in sidebar
            const items = document.querySelectorAll('.conv-item');
            items.forEach(item => item.classList.remove('active'));
            // Note: Simplification, would normally use data-id
            loadHistory();
            
            // Clear old interval and set new one for history
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(loadHistory, 3000); // Poll every 3 seconds for active chat
        }

        async function loadHistory() {
            if (!activeUserId) return;

            const res = await fetch(`/api/chat/history/${activeUserId}/`, {
                headers: { 'Authorization': `Token ${token}` }
            });
            const messages = await res.json();
            const box = document.getElementById('messages-box');

            if (messages.length === 0) {
                box.innerHTML = '<div class="empty-state"><p>No messages with this user yet.</p></div>';
                return;
            }

            const atBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 100;

            box.innerHTML = messages.map(msg => `
                <div class="message ${msg.sender === currentUser.id ? 'sent' : 'received'}">
                    ${msg.content}
                    <span class="time">${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
            `).join('');

            if (atBottom) {
                box.scrollTop = box.scrollHeight;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content || !activeUserId) return;

            const res = await fetch('/api/chat/send/', {
                method: 'POST',
                headers: { 
                    'Authorization': `Token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ receiver: activeUserId, content: content })
            });

            if (res.ok) {
                input.value = '';
                loadHistory();
            }
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
